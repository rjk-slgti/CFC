<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Accounting & Footprint Dashboard</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">Carbon Accounting Dashboard</h1>
        <nav class="header__nav">
            <button class="header__theme-toggle" id="themeToggle">Toggle Theme</button>
        </nav>
    </header>

    <aside class="sidebar">
        <nav class="sidebar__nav">
            <ul class="sidebar__list">
                <li class="sidebar__item">
                    <a href="#dashboard" class="sidebar__link sidebar__link--active" data-route="dashboard">Dashboard</a>
                </li>
                <li class="sidebar__item">
                    <a href="#data-entry" class="sidebar__link" data-route="data-entry">Data Entry</a>
                </li>
                <li class="sidebar__item">
                    <a href="#reports" class="sidebar__link" data-route="reports">Reports</a>
                </li>
                <li class="sidebar__item">
                    <a href="#settings" class="sidebar__link" data-route="settings">Settings</a>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content" id="mainContent">
        <!-- Dynamic content will be loaded here -->
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
